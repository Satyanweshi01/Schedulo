<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Schedulo Editor</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}" />
    </head>
    <body>
        <main>
            <!-- Schedule Grid Section: displays timetable with days, time slots, and subject entries -->
            <div class="table-area">
                <!-- Header row: Day, Stream, and Time Slots -->
                <div class="box th">Day</div>
                <div class="box th">Stream</div>
                <div class="box th">10:00-10:50</div>
                <div class="box th">10:50-11:40</div>
                <div class="box th">11:40-12:30</div>
                <div class="box th">12:30-1:20</div>
                <div class="box th">1:20-2:00</div>
                <div class="box th">2:00-2:50</div>
                <div class="box th">2:50-3:40</div>
                <div class="box th">3:40-4:30</div>
                <div class="box th">4:30-5:20</div>

                <!-- Monday Row: 1 day column + 1 stream column + 9 time slot cells -->
                <div class="box day">Monday</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box recess">RE</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>

                <!-- Tuesday Row -->
                <div class="box day">Tuesday</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box recess">C</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>

                <!-- Wednesday Row -->
                <div class="box day">Wednesday</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box recess">E</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>

                <!-- Thursday Row -->
                <div class="box day">Thursday</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box recess">S</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>

                <!-- Friday Row -->
                <div class="box day">Friday</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box recess">S</div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>

            <!-- Faculty Panel: displays list of teachers for assignment to schedule -->
            <div class="faculty-area">
                <!-- Search box for filtering teachers by name -->
                <input type="text" class="search" placeholder="Search teachers..." />
                <!-- Teacher cards are dynamically generated by JavaScript -->
            </div>

            <!-- Week Section: displays current week, positioned below the schedule -->
            <div class="week-section">
                <h2>{{week}}</h2>
            </div>

            <!-- Control Panel: buttons for storing JSON and PDF export -->
            <div class="control-area">
                <!-- Left Control: OK Button to store JSON in variable -->
                <div class="control-item">
                    <div class="btn-ok">
                        <button title="Store schedule JSON for backend submission">OK</button>
                    </div>
                </div>

                <!-- Center Control: Placeholder/Info -->
                <div class="control-item">
                    <!-- Reserved for future use -->
                </div>

                <!-- Right Control: Export to PDF -->
                <div class="control-item">
                    <div class="btn-download">
                        <button title="Download schedule as PDF">Download PDF</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Load the editor JavaScript after DOM is loaded -->
        <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
    </body>
</html>
