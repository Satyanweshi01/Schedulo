<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Database Edit Form</title>
        <link
            rel="stylesheet"
            href="../../../static/css/database_edit_form.css"
        />
    </head>
    <body>
        <header>
            <h2>Manage Subjects</h2>
        </header>
        <main>
            <div class="general-form-area">
                <div class="form-heading">
                    <h3>SELECTED: Batch/Dept/Teacher 1/2/3...(Placeholder)</h5>
                </div>
                <div class="form-main">
                    <form action="" method="">
                        <!-- Remove h3 later -->
                        <div class="form-group">
                            <h3 style="margin-bottom: 15px;">Batch/Dept/Teacher Form(Placeholder)</h3> 
                        </div>

                        <div class="form-group"><label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="full_name" required autofocus autocomplete="name"></div>

                        <div class="form-group">
                            <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required>
                        </div>

                        <div class="form-group"><label for="department">Department:</label>
        <input type="text" id="department" name="department" required></div>

                        <div class="form-group">
                            <button id="save_button" type="submit">SAVE</button>
                            <button id="delete_button" type="submit">DELETE</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="curr-data-area">
                <div class="curr-data-heading">
                    <h3>Current Database</h5>
                </div>
                <div class="curr-data-main">
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 1</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 2</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 3</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 4</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 5</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 6</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                    <div class="card">
                        <div class="card-content">Batch/Dept/Teacher 7</div>
                        <div class="card-edit"><button></button></div>
                        <div class="card-delete"><button></button></div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
